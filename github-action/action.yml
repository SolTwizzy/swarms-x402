name: 'SwarmX Contract Audit'
description: 'Audit smart contracts with 4 AI agents via SwarmX'
inputs:
  files:
    description: 'Glob pattern for contract files to audit'
    required: false
    default: '**/*.sol'
  language:
    description: 'Contract language (solidity or rust)'
    required: false
    default: 'solidity'
  api-url:
    description: 'SwarmX API URL'
    required: false
    default: 'https://api.swarmx.io'
  fail-on-critical:
    description: 'Fail the check if critical issues found'
    required: false
    default: 'true'
  wallet-private-key:
    description: 'Solana private key for paid audits (optional — uses free tier if not set)'
    required: false
outputs:
  risk-score:
    description: 'Overall risk score (0-100)'
  findings-count:
    description: 'Total number of findings'
  report-url:
    description: 'URL to the full audit report'
runs:
  using: 'node20'
  main: 'dist/index.js'
